server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: webhook
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info

webhook:
  signature:
    secret: ${WEBHOOK_SECRET:change-me}
  rabbit:
    exchange: webhook.events
    queue: webhook.to-carland
    routing-key: partner.event
  carland:
    base-url: ${CARLAND_BASE_URL:http://carland-service:9091}
    internal-token: ${CARLAND_INTERNAL_TOKEN:change-me}
    health-path: /actuator/health
    vin-exists-path: /internal/partner/cars/exists
