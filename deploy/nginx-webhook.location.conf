# nginx container (container_name: nginx) server block icine ekle.
# nginx ve webhook-service ayni network'te olmali: carland-network
#
# Oncelik: /webhook/ location, genel SPA/root location'dan ONCE olmali.
#
# Dis URL:  https://digital-innovation.agency/webhook/test
# Backend:  http://webhook-service:8080/webhook/test
#
# webhook-service icin ports map GEREKMEZ (sadece ic network).

location /webhook/ {
    proxy_pass http://webhook-service:8080/webhook/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_max_body_size 10m;
}
