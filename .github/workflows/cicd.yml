name: Webhook CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: bash gradlew clean build -x test

      - name: Calculate version
        run: |
          LAST_TAG=$(git tag --list "v1.0.*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEW_VERSION="v1.0.0"
          else
            PATCH=$(echo $LAST_TAG | cut -d'.' -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v1.0.$PATCH"
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/webhook-service:${{ env.NEW_VERSION }} .

      - name: Push version image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/webhook-service:${{ env.NEW_VERSION }}

      - name: Tag latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/webhook-service:${{ env.NEW_VERSION }} \
                     ${{ secrets.DOCKER_USERNAME }}/webhook-service:latest

      - name: Push latest image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/webhook-service:latest

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ env.NEW_VERSION }}
          git push origin ${{ env.NEW_VERSION }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker-compose pull webhook-service
            docker-compose up -d --no-deps webhook-service
